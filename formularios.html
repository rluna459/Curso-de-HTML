<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
</head>
<body>
    <!--Es un tipo de input de datos 
    En pocas palabras: los formularios son la manera de recoger información del usuario en una página web, como cuando completás un registro o iniciás sesión.-->
    <!--
    required es un atributo de funcionalidad para poner que es un campo obligatorio
    type para elegir el tipo de input
    value para ponerle nombre al 
    name es un identificador para ´ponerle nombre a los campos inputs
    placeholder es un pequeño texto que se usa para dar un ejemplo de lo que hay que escribir 
    -->
    <form>
        <input type="text" name="username" placeholder="pone tu usuario">
        <input type="color" name="email">
        <input type="submit" value="mandar formulario">
        <input type="email">
        <input type="password">
        <input type="checkbox">
        <input type="radio">
        <input type="date">
        <input type="file">

    </form>
</body>
</html>
